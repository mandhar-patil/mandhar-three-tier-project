kind: Deployment
apiVersion: apps/v1
metadata:
   name: frontend-deployment
   namespace: three-tier
spec:
  replicas: 1
  selector:
   matchLabels:
    app: frontend
  template:
   metadata:
    labels:
      app: frontend

   spec:
     containers:
       - name: frontend
         image: mandhar12/informatrix-frontend:v1
         ports:
          - containerPort: 3000
         env:
           - name: REACT_APP_BACKEND_URL
             value: "http://192.168.157.132:3500/api/tasks"
