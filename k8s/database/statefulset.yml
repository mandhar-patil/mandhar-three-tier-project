kind: StatefulSet
apiVersion: apps/v1
metadata:
   name: mongodb
   namespace: three-tier
spec:
   serviceName: mongodb-service
   replicas: 1
   selector:
    matchLabels:
      app: mongodb
   template:
    metadata:
     labels:
       app: mongodb

    spec:
       containers:
           - name: mongodb
             image: mongo:7.0
             args: ["--bind_ip_all"]
             env: 
              - name: MONGO_INITDB_ROOT_USERNAME
                valueFrom:
                  secretKeyRef: 
                      name: mongo-secret
                      key: MONGO_INITDB_ROOT_USERNAME
              - name:  MONGO_INITDB_ROOT_PASSWORD
                valueFrom:
                  secretKeyRef: 
                    name: mongo-secret
                    key: MONGO_INITDB_ROOT_PASSWORD          
             ports:
              - containerPort: 27017
             volumeMounts:
              - name: mongo-data
                mountPath: /data/db
   volumeClaimTemplates:
     - metadata:
          name: mongo-data
       spec:
         accessModes: ["ReadWriteOnce"]
         resources:
          requests:
            storage: 1Gi
    
   
